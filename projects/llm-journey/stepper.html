<style>
  /* ===STYLE-START=== */
  :root{
    --paper:#FAF8F3; --ink:#2B2B2B; --blue:#2563EB; --rust:#C04A1A;
    --green:#1E7A4D; --hl:#F5D547; --faint:rgba(43,43,43,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);
    font-family:'Nunito',-apple-system,BlinkMacSystemFont,sans-serif;font-size:16px;}
  .hand{font-family:'Caveat',cursive}
  .wb-card{background:#fff;border:2px solid var(--ink);border-radius:14px;
    box-shadow:4px 4px 0 rgba(43,43,43,.12);}
  .wb-btn{font-family:'Nunito',sans-serif;font-weight:800;font-size:15px;cursor:pointer;
    background:#fff;color:var(--ink);border:2px solid var(--ink);border-radius:10px;
    padding:10px 22px;box-shadow:3px 3px 0 rgba(43,43,43,.18);transition:transform .08s;}
  .wb-btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 rgba(43,43,43,.2)}
  .wb-btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 rgba(43,43,43,.2)}
  .wb-btn.primary{background:var(--blue);color:#fff;border-color:var(--ink)}
  .wb-btn.rust{background:var(--rust);color:#fff}
  .wb-btn:disabled{opacity:.35;cursor:default;transform:none}
  .tok{display:inline-block;border:2px solid var(--ink);border-radius:8px;padding:4px 10px;
    margin:3px;background:#fff;font-weight:600;position:relative}
  .tok.hero{background:var(--hl)}
  .tok.future{opacity:.32;border-style:dashed}
  .tok.gen{background:#E8F1FF;border-color:var(--blue)}
  .tok.clickable{cursor:pointer}
  .tok.clickable:hover{transform:translateY(-2px)}
  input[type=range]{accent-color:var(--rust);width:100%}
  @keyframes stampIn{0%{transform:scale(2.2) rotate(-14deg);opacity:0}
    60%{transform:scale(.92) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0)}}
  @keyframes popIn{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes flashBox{0%{background:var(--hl)}100%{background:#fff}}
  @keyframes drawLine{from{stroke-dashoffset:300}to{stroke-dashoffset:0}}
  .stamp-anim{animation:stampIn .5s ease-out both}
  .pop-anim{animation:popIn .35s ease-out both}
  .flash{animation:flashBox .7s ease-out}
  .barfill{transition:width .45s cubic-bezier(.2,.8,.2,1)}
  /* ===STYLE-END=== */

// ---------- toy LM math ----------
function applyTemperature(cands,T){
  const w=cands.map(c=>Math.pow(Math.max(c.p,1e-6),1/T));
  const s=w.reduce((a,b)=>a+b,0);
  return cands.map((c,i)=>({...c,q:w[i]/s}));
}
function topPSet(cands,topP){ // cands sorted desc by q
  let cum=0; const kept=[];
  for(const c of cands){ kept.push(c); cum+=c.q; if(cum>=topP) break; }
  return kept;
}
function nextCandidates(prompt,genTokens){
  const last=genTokens.length?genTokens[genTokens.length-1]:null;
  if(last===null) return prompt.start;
  return prompt.bigram[last]||[{t:'.',p:1}];
}

// ---------- small shared components ----------
function ArrowSvg({angle=0,len=110,color=RUST,ghost=false,notes=0,w=260,h=200}){
  const cx=w/2,cy=h/2;
  const rad=angle*Math.PI/180;
  const x2=cx+len*Math.cos(rad), y2=cy-len*Math.sin(rad);
  const ticks=[];
  for(let i=0;i<notes;i++){
    const f=(i+1)/(notes+1);
    const tx=cx+len*f*Math.cos(rad), ty=cy-len*f*Math.sin(rad);
    ticks.push(<circle key={i} cx={tx} cy={ty} r="3.5" fill={i%2?BLUE:GREEN} opacity="0.85"/>);
  }
  return (
    <svg width={w} height={h} style={{display:'block'}}>
      <line x1={cx} y1={cy} x2={x2} y2={y2} stroke={color} strokeWidth="5"
        strokeLinecap="round" opacity={ghost?0.25:1} strokeDasharray={ghost?'7 7':'none'}/>
      <polygon points={`${x2},${y2} ${x2-14*Math.cos(rad-0.45)},${y2+14*Math.sin(rad-0.45)} ${x2-14*Math.cos(rad+0.45)},${y2+14*Math.sin(rad+0.45)}`}
        fill={color} opacity={ghost?0.25:1}/>
      <circle cx={cx} cy={cy} r="5" fill={INK}/>
      {ticks}
    </svg>);
}
function SceneFrame({title,lead,children,aside}){
  return (
    <div style={{maxWidth:880,margin:'0 auto',padding:'8px 8px 24px'}}>
      <h2 className="hand" style={{fontSize:38,margin:'4px 0 6px',lineHeight:1.1}}>{title}</h2>
      <p style={{fontSize:16.5,lineHeight:1.55,margin:'0 0 18px',maxWidth:760}}>{lead}</p>
      {children}
      {aside && <div style={{marginTop:18,padding:'12px 16px',border:`2px dashed ${RUST}`,
        borderRadius:12,background:'#FFF7F2',fontSize:14.5,lineHeight:1.5}}>✏️ {aside}</div>}
    </div>);
}
function SentenceRow({prompt,heroOn=true,maskFrom=null,onTok=null,active=[],gen=[]}){
  return (
    <div style={{margin:'6px 0 14px'}}>
      {prompt.tokens.map((t,i)=>{
        const cls=['tok'];
        if(heroOn&&i===prompt.hero) cls.push('hero');
        if(maskFrom!==null&&i>maskFrom) cls.push('future');
        if(onTok&&i<prompt.reader) cls.push('clickable');
        if(active.includes(i)) cls.push('flash');
        return <span key={i} className={cls.join(' ')}
          onClick={onTok&&i<prompt.reader?()=>onTok(i):undefined}>{t}</span>;
      })}
      {gen.map((t,i)=><span key={'g'+i} className="tok gen pop-anim">{t}</span>)}
    </div>);
}

  const [layer,setLayer]=useState(1);
  const n=progress==null?layer:1+Math.round(progress*31);
  return (
    <SceneFrame title={L.s6Title} lead={L.s6Lead}>
      <div style={{display:'flex',gap:24,alignItems:'center',flexWrap:'wrap'}}>
        <div className="wb-card" style={{padding:8}}>
          <ArrowSvg angle={35+n*1.2} notes={Math.min(n,14)} len={108} w={280} h={200}/>
          <div style={{textAlign:'center',fontSize:13,fontWeight:800,marginTop:-24}}>
            {L.s6Block(n)} · <span style={{color:GREEN}}>{L.s6Notes(n)}</span></div>
        </div>
        <div className="wb-card" style={{padding:'12px 16px',width:170}}>
          <div className="hand" style={{fontSize:22,marginBottom:4}}>RMSNorm</div>
          <div style={{height:10,border:`1.5px solid ${INK}`,borderRadius:5,overflow:'hidden'}}>
            <div style={{width:'72%',height:'100%',background:GREEN}}/>
          </div>
          <div style={{fontSize:11.5,color:'var(--faint)',marginTop:4}}>length → standard ✓</div>
        </div>
      </div>
      {progress==null&&<div style={{maxWidth:460,marginTop:18}}>
        <div style={{fontSize:14,fontWeight:800,marginBottom:4}}>{L.s6Scrub}</div>
        <input type="range" min="1" max="32" value={layer} onChange={e=>setLayer(+e.target.value)}/>
      </div>}
    </SceneFrame>);
}

function Scene7({L,prompt}){
  const [gen,setGen]=useState([]);
  const [temp,setTemp]=useState(1.0);
  const [topP,setTopP]=useState(0.95);
  const [auto,setAuto]=useState(false);
  const [flash,setFlash]=useState(0);
  const done=gen.length>0&&gen[gen.length-1]==='.';
  const raw=nextCandidates(prompt,gen);
  const reweighted=useMemo(()=>{
    const c=applyTemperature(raw,temp).sort((a,b)=>b.q-a.q);
    const kept=topPSet(c,topP).map(x=>x.t);
    return c.map(x=>({...x,kept:kept.includes(x.t)}));
  },[raw,temp,topP]);
  const step=(greedy)=>{
    if(done) return;
    const pool=reweighted.filter(c=>c.kept);
    let pick;
    if(greedy) pick=pool[0];
    else{
      const s=pool.reduce((a,c)=>a+c.q,0); let r=Math.random()*s;
      pick=pool[0];
      for(const c of pool){ r-=c.q; if(r<=0){pick=c;break;} }
    }
    setGen(g=>[...g,pick.t]); setFlash(f=>f+1);
  };
  useEffect(()=>{
    if(!auto||done) {if(done) setAuto(false); return;}
    const t=setTimeout(()=>step(false),950);
    return ()=>clearTimeout(t);
  },[auto,gen,done]);
  useEffect(()=>{setGen([]);setAuto(false);},[prompt.id]);
  const maxQ=Math.max(...reweighted.map(c=>c.q),0.01);
  return (
    <SceneFrame title={L.s7Title} lead={L.s7Lead}>
      <div style={{fontSize:12.5,color:RUST,fontWeight:600,marginBottom:10}}>⚠ {L.s7Honest}</div>
      <SentenceRow prompt={prompt} heroOn={false} gen={gen}/>
      <div style={{display:'flex',gap:18,flexWrap:'wrap',alignItems:'flex-start'}}>
        <div className="wb-card" style={{padding:'14px 18px',flex:'1 1 340px',maxWidth:480}}>
          <div style={{fontSize:14,fontWeight:800,marginBottom:8}}>{L.s7Dist}</div>
          {done
            ? <div className="pop-anim hand" style={{fontSize:26,color:GREEN}}>■ {L.s7Done(gen.length)}</div>
            : reweighted.map((c,i)=>(
              <div key={c.t} style={{display:'flex',alignItems:'center',gap:8,margin:'4px 0',
                opacity:c.kept?1:.3}}>
                <span style={{width:96,fontWeight:700,fontFamily:'monospace'}}>{c.t==='.'?'⟨.⟩':c.t}</span>
                <div style={{flex:1,height:17,border:`1.5px solid ${INK}`,borderRadius:6,overflow:'hidden'}}>
                  <div className="barfill" style={{width:(c.q/maxQ*100)+'%',height:'100%',
                    background:c.kept?(i===0?RUST:BLUE):'#bbb'}}/>
                </div>
                <span style={{width:52,fontSize:13,fontWeight:800,textAlign:'right'}}>{(c.q*100).toFixed(1)}%</span>
                {!c.kept&&<span style={{fontSize:10.5,color:'var(--faint)'}}>{L.s7Cut}</span>}
              </div>))}
          <div style={{display:'flex',gap:10,marginTop:14,flexWrap:'wrap'}}>
            <button className="wb-btn rust" onClick={()=>step(false)} disabled={done}>{L.s7Sample}</button>
            <button className="wb-btn" onClick={()=>step(true)} disabled={done}>{L.s7Greedy}</button>
            <button className="wb-btn primary" onClick={()=>setAuto(a=>!a)} disabled={done}>
              {auto?L.s7Stop:L.s7Auto}</button>
            <button className="wb-btn" onClick={()=>{setGen([]);setAuto(false);}}>{L.s7Reset}</button>
          </div>
        </div>
        <div style={{flex:'1 1 240px',maxWidth:330}}>
          <div className="wb-card" style={{padding:'12px 16px',marginBottom:14}}>
            <div style={{fontSize:13.5,fontWeight:800}}>{L.s7Temp}: {temp.toFixed(1)}</div>
            <input type="range" min="0.1" max="2" step="0.1" value={temp} onChange={e=>setTemp(+e.target.value)}/>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:11.5,color:'var(--faint)'}}>
              <span>{L.s7TempLo}</span><span>{L.s7TempHi}</span></div>
            <div style={{fontSize:13.5,fontWeight:800,marginTop:10}}>{L.s7TopP}: {topP.toFixed(2)}</div>
            <input type="range" min="0.5" max="1" step="0.05" value={topP} onChange={e=>setTopP(+e.target.value)}/>
          </div>
          <div className="wb-card" style={{padding:'12px 16px'}}>
            <div className="hand" style={{fontSize:24,color:RUST,marginBottom:6}}>{L.s7Loops(gen.length)}</div>
            <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap'}} key={flash}>
              {L.s7Pipe.map((s,i)=>(
                <React.Fragment key={s}>
                  <span className={flash>0?'flash':''} style={{border:`1.5px solid ${INK}`,borderRadius:6,
                    padding:'2px 7px',fontSize:11.5,fontWeight:700,
                    animationDelay:(i*0.12)+'s'}}>{s}</span>
                  {i<L.s7Pipe.length-1&&<span style={{fontSize:11}}>→</span>}
                </React.Fragment>))}
              <span style={{fontSize:15,marginLeft:2}}>↺</span>
            </div>
          </div>
        </div>
      </div>
    </SceneFrame>);
}

const DECODER_ROWS=[
  {term:'vocab_size = 128,256',scene:1,en:['tokenizer (front door)','how many word-pieces the catalogue holds'],zh:['分词器（大门）','目录里词片的总数']},
  {term:'hidden_size = 4,096',scene:2,en:['the arrow / belt width','numbers in every token’s vector'],zh:['箭头 / 传送带宽度','每个 token 向量的数字个数']},
  {term:'num_hidden_layers = 32',scene:6,en:['conveyor blocks','meeting-room + workshop repeats'],zh:['传送带厂块','会议室+车间的重复次数']},
  {term:'num_attention_heads = 32',scene:4,en:['meeting rooms per block','parallel attention passes'],zh:['每块的会议室数','并行注意力通道']},
  {term:'num_key_value_heads = 8',scene:4,en:['shared filing cabinets (GQA)','4 askers share 1 KV cabinet'],zh:['共享文件柜（GQA）','4 个提问者共用 1 柜']},
  {term:'intermediate_size = 14,336',scene:5,en:['detector hall width (FFN)','detector-stamp pairs per block'],zh:['探测器大厅宽度（FFN）','每块的探测器+印章对数']},
  {term:'hidden_act = silu (SwiGLU)',scene:5,en:['the dimmer gate','decides how hard detectors stamp'],zh:['调光闸门','决定探测器盖章的力度']},
  {term:'rope_theta = 500,000',scene:3,en:['order-stamp tuning (RoPE)','rotation frequency spread'],zh:['顺序印章调参（RoPE）','旋转频率分布']},
  {term:'rms_norm_eps = 1e-5',scene:6,en:['calibration gauge (RMSNorm)','keeps arrow length stable'],zh:['校准仪（RMSNorm）','保持箭头长度稳定']},
  {term:'temperature / top_p',scene:7,en:['the dice at the exit','sampling sharpness & cutoff'],zh:['出口处的骰子','抽样锐度与截断']},
];
function Scene8({L,lang,goto}){
  return (
    <SceneFrame title={L.s8Title} lead={L.s8Lead}>
      <div className="wb-card" style={{overflow:'hidden'}}>
        <table style={{borderCollapse:'collapse',width:'100%',fontSize:14}}>
          <thead><tr style={{background:'#F1EDE3'}}>
            {L.s8Cols.map(c=><th key={c} style={{textAlign:'left',padding:'9px 14px',
              borderBottom:`2px solid ${INK}`}}>{c}</th>)}
          </tr></thead>
          <tbody>
            {DECODER_ROWS.map(r=>{
              const txt=lang==='zh'?r.zh:r.en;
              return (<tr key={r.term} onClick={()=>goto&&goto(r.scene)}
                style={{cursor:goto?'pointer':'default'}}
                onMouseEnter={e=>e.currentTarget.style.background='#FFFBEA'}
                onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                <td style={{padding:'8px 14px',fontFamily:'monospace',fontWeight:700,
                  borderBottom:'1px solid rgba(43,43,43,.15)'}}>{r.term}</td>
                <td style={{padding:'8px 14px',fontWeight:700,color:RUST,
                  borderBottom:'1px solid rgba(43,43,43,.15)'}}>{txt[0]}</td>
                <td style={{padding:'8px 14px',borderBottom:'1px solid rgba(43,43,43,.15)'}}>{txt[1]}</td>
              </tr>);})}
          </tbody>
        </table>
      </div>
      <p className="hand" style={{fontSize:28,color:GREEN,marginTop:18}}>{L.s8Close}</p>
    </SceneFrame>);
}

const SCENES=[Scene0,Scene1,Scene2,Scene3,Scene4,Scene5,Scene6,Scene7,Scene8];
/* ===SHARED-END=== */

/* ===SHELL-START=== */
function StepperApp(){
  const [lang,setLang]=useState(localStorage.getItem('lj-lang')||'en');
  const [promptId,setPromptId]=useState(localStorage.getItem('lj-prompt')||'cat');
  const [idx,setIdx]=useState(+(localStorage.getItem('lj-scene')||0));
  const L=STRINGS[lang];
  const prompt=PROMPTS.find(p=>p.id===promptId)||PROMPTS[0];
  useEffect(()=>{localStorage.setItem('lj-lang',lang);},[lang]);
  useEffect(()=>{localStorage.setItem('lj-prompt',promptId);},[promptId]);
  useEffect(()=>{localStorage.setItem('lj-scene',String(idx));},[idx]);
  useEffect(()=>{
    const h=(e)=>{
      if(window.__sceneKeyHandler&&window.__sceneKeyHandler(e.key)) return;
      if(e.key==='ArrowRight') setIdx(i=>Math.min(i+1,SCENES.length-1));
      if(e.key==='ArrowLeft') setIdx(i=>Math.max(i-1,0));
    };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[]);
  const Scene=SCENES[idx];
  return (
    <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
      <header style={{display:'flex',alignItems:'baseline',gap:16,padding:'18px 26px 6px',flexWrap:'wrap'}}>
        <h1 className="hand" style={{fontSize:34,margin:0}}>{L.appTitle}</h1>
        <span style={{fontSize:13.5,color:'var(--faint)'}}>{L.appSub}</span>
        <a className="wb-btn" href="index.html" data-testid="home"
          style={{marginLeft:'auto',padding:'5px 14px',fontSize:13,textDecoration:'none',display:'inline-block'}}>⌂ {L.home}</a>
        <button className="wb-btn" style={{padding:'5px 14px',fontSize:13}}
          onClick={()=>setLang(l=>l==='en'?'zh':'en')} data-testid="lang-toggle">{L.langBtn}</button>
      </header>
      <nav style={{display:'flex',gap:0,alignItems:'center',padding:'8px 26px 14px',flexWrap:'wrap'}} data-testid="rail">
        {L.stops.map((s,i)=>(
          <React.Fragment key={i}>
            <button onClick={()=>setIdx(i)} style={{cursor:'pointer',border:`2px solid ${INK}`,
              background:i===idx?(i===7?RUST:BLUE):i<idx?'#E6F0E9':'#fff',
              color:i===idx?'#fff':INK,borderRadius:18,padding:'4px 12px',fontSize:12.5,
              fontWeight:800,fontFamily:'Nunito,sans-serif'}}>{s}</button>
            {i<L.stops.length-1&&<span style={{margin:'0 3px',color:'var(--faint)'}}>—</span>}
          </React.Fragment>))}
      </nav>
      <main style={{flex:1,padding:'4px 26px'}}>
        <Scene L={L} lang={lang} prompt={prompt} setPromptId={setPromptId}
          progress={null} goto={(n)=>setIdx(n)}/>
      </main>
      <footer style={{display:'flex',gap:12,alignItems:'center',padding:'14px 26px 26px'}}>
        <button className="wb-btn" onClick={()=>setIdx(i=>Math.max(i-1,0))}
          disabled={idx===0} data-testid="back">{L.back}</button>
        <button className="wb-btn primary" onClick={()=>setIdx(i=>Math.min(i+1,SCENES.length-1))}
          disabled={idx===SCENES.length-1} data-testid="next">{L.next}</button>
        {idx===SCENES.length-1&&
          <button className="wb-btn" onClick={()=>setIdx(0)}>{L.restart}</button>}
        <span style={{marginLeft:'auto',fontSize:11.5,color:'var(--faint)',maxWidth:380,textAlign:'right'}}>{L.footer}</span>
      </footer>
    </div>);
}
ReactDOM.createRoot(document.getElementById('root')).render(<StepperApp/>);
/* ===SHELL-END=== */
